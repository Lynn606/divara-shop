<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divara Beauty Shop</title>
    <style>
        body {
            background-color: #dfb3aa; /* Matches your logo background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            color: #432a26; /* Deep cocoa text for better legibility */
        }
        .product-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }
        .product-card {
            background-color: white;
            padding: 20px;
            border-radius: 15px;
            width: 220px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }
        .buy-btn {
            background-color: #8d584d; /* Rose Gold/Copper from logo text */
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }
        .category-title { 
            color: #8d584d; 
            text-align: left; 
            margin-left: 5%; 
            border-bottom: 2px solid #d4a59a; 
            width: 90%; 
            margin-top: 40px;
            padding-bottom: 5px;
        }
        #receipt-box {
            position: fixed;
            bottom: 85px;
            right: 20px;       
            background-color: #fffdf0; 
            border-top: 4px dashed #8d584d; 
            width: 220px;
            padding: 15px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2); 
            font-family: 'Courier New', Courier, monospace;
            z-index: 100;
        }
        .wa-checkout {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #25d366;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            z-index: 1001;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .footer { background-color: #432a26; color: white; padding: 30px; margin-top: 50px; }
    </style>
</head>
<body>

<header style="background: url('logo.png'); background-size: cover; background-position: center; height: 50vh; display: flex; align-items: center; justify-content: center;">
    <button style="background: #8d584d; color: white; border: none; padding: 12px 30px; border-radius: 25px; cursor: pointer; font-weight: bold;" onclick="document.getElementById('welcome').scrollIntoView({behavior: 'smooth'})">
        Shop Collection
    </button>
</header>

<h1 id="welcome" style="letter-spacing: 3px; text-transform: uppercase;">Divara Beauty</h1>

<div id="receipt-box">
    <h3 style="margin:0;">🌸 DIVARA 🌸</h3>
    <p style="font-size: 10px;">OFFICIAL RECEIPT</p>
    <ul id="cart-list" style="list-style:none; padding:0; font-size:12px; text-align:left;"></ul>
    <hr>
    <p style="text-align:right;">TOTAL: KES <span id="total-price">0</span></p>
</div>

<button class="wa-checkout" onclick="checkout()">Order via WhatsApp 💬</button>

<h2 class="category-title">✨ Fragrance</h2>
<div class="product-grid">
    <div class="product-card">
        <img src="perfume.jpg" alt="Perfume">
        <h3>Good Girl Essence</h3>
        <p>KES 2,000</p>
        <button class="buy-btn" onclick="addToCart('Essence Perfume', 2000)">Add to Cart</button>
    </div>
</div>

<h2 class="category-title">💄 Beauty</h2>
<div class="product-grid">
    <div class="product-card">
        <img src="Lipgloss.jpeg" alt="Lip Gloss">
        <h3>Lip Gloss</h3>
        <p>KES 120</p>
        <button class="buy-btn" onclick="addToCart('Lip Gloss', 120)">Add to Cart</button>
    </div>
    <div class="product-card">
        <img src="Lip Therapy.jpeg" alt="Lip Therapy">
        <h3>Lip Therapy</h3>
        <p>KES 500</p>
        <button class="buy-btn" onclick="addToCart('Lip Therapy', 500)">Add to Cart</button>
    </div>
</div>

<div class="footer">
    <p>Location: Juja, Kenya | WhatsApp: 0114654307</p>
    <p>&copy; 2026 Divara Shop</p>
</div>

<script>
    let total = 0;
    window.onload = function() {
        if(localStorage.getItem("divaraTotal")) {
            total = parseInt(localStorage.getItem("divaraTotal"));
            document.getElementById("total-price").innerText = total;
            document.getElementById("cart-list").innerHTML = localStorage.getItem("divaraCart");
        }
    }

    function addToCart(name, price) {
        total += price;
        document.getElementById("total-price").innerText = total;
        let list = document.getElementById("cart-list");
        let item = document.createElement("li");
        item.innerHTML = `${name} - ${price} <span style="color:red; cursor:pointer;" onclick="removeFromCart(this, ${price})">×</span>`;
        list.appendChild(item);
        localStorage.setItem("divaraTotal", total);
        localStorage.setItem("divaraCart", list.innerHTML);
    }

    function removeFromCart(el, price) {
        total -= price;
        document.getElementById("total-price").innerText = total;
        el.parentElement.remove();
        localStorage.setItem("divaraTotal", total);
        localStorage.setItem("divaraCart", document.getElementById("cart-list").innerHTML);
    }

    function checkout() {
        let items = document.querySelectorAll("#cart-list li");
        if (items.length === 0) return alert("Cart empty!");
        let msg = "New Order from Divara:%0A";
        items.forEach(i => msg += "- " + i.innerText.replace("×", "").trim() + "%0A");
        msg += "%0A*Total: KES " + total + "*";
        window.open("https://wa.me/254114654307?text=" + msg, "_blank");
    }
</script>
</body>
</html>
